<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>Lucky Draw</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/exceljs@4.3.0/dist/exceljs.min.js"></script>
</head>

<body>
  <header class="header">
    <h1 class="title">Lucky Draw</h1>
    <p class="subtitle"> 27th Metta Charity Golf 2026</p>
  </header>

  <main class="container">
    <section class="panel inputs">
      <div class="field">
        <label for="names">Participants</label>
        <textarea id="names" placeholder="One name per line"></textarea>
        <p id="duplicateWarning" class="warning-text" hidden></p>
      </div>

      <div class="field">
        <label for="prizes">Prizes</label>
        <textarea id="prizes" placeholder="One prize per line"></textarea>
      </div>

      <div class="meta">
        <div>Total participants: <strong id="countNames">0</strong></div>
        <div>Total prizes: <strong id="countPrizes">0</strong></div>
        <div>Remaining: <strong id="remainingCount">0</strong></div>
        <div class="precount-field">
          <label for="preCount">Pre draw count</label>
          <input id="preCount" type="number" min="1" value="10" />
        </div>
      </div>

      <div class="controls">
        <button id="saveLists" class="btn btn-primary">Save lists</button>
        <button id="loadLists" class="btn">Load lists</button>
        <button id="clearLists" class="btn btn-ghost">Clear saved</button>
        <button id="exportExcel" class="btn btn-success">Export Excel</button>
      </div>
    </section>

    <section class="panel wheel-and-results">
      <section class="panel wheel-area">
        <div id="resultBanner" class="result-banner" role="status" aria-live="polite">Ready</div>

        <div class="progress-wrap" aria-hidden="true">
          <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="progress-label" id="progressLabel">0 of 0 drawn</div>

        <div class="wheel-wrap">
          <canvas id="wheel" width="520" height="520"></canvas>
          <div class="wheel-overlay">
            <div class="pointer"></div>
            <div id="centerText" class="center-text" aria-live="polite">Ready</div>
          </div>
        </div>

        <div class="spin-controls">
          <button id="spinOnce" class="btn btn-primary">Spin once</button>
          <button id="preDraw" class="btn btn-primary">Pre draw</button>
          <button id="stop" class="btn btn-danger">Stop</button>
          <button id="reset" class="btn btn-ghost">Reset results</button>
        </div>
        <p class="kbd-hint"><kbd>Space</kbd> spin once &middot; <kbd>Esc</kbd> stop</p>

        <div class="ticker" id="ticker"></div>
      </section>

      <section class="panel results">
        <div class="results-head">
          <h2>Results</h2>
          <div class="results-actions">
            <input id="searchResults" type="search" class="search-input" placeholder="Search participant…" aria-label="Search results" />
            <button id="sortByName" class="btn">Sort by name</button>
            <button id="sortByNo" class="btn">Sort by draw</button>
          </div>
        </div>
        <div class="table-scroll">
          <table id="resultsTable">
            <thead>
              <tr>
                <th>No</th>
                <th>Participant</th>
                <th>Prize</th>
                <th>Time</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
        <p id="noResultsMsg" class="empty-text" hidden>No results yet.</p>
      </section>
    </section>
  </main>

  <footer class="footer">Good luck and glow on</footer>

  <script src="script.js"></script>
</body>

</html>
